# PR 检查工作流
# PR 事件的统一入口，通过 workflow_call 调用 ci.yml/lint.yml/import-test.yml
# 避免这些工作流同时被 push 和 pull_request 直接触发导致重复运行

name: PR Check

on:
  pull_request:
    branches:
      - main
      - master
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - labeled  # 支持标签触发（如 run-ml-tests）

jobs:
  # 重用 CI 工作流的测试结果
  ci-tests:
    name: CI 测试
    uses: ./.github/workflows/ci.yml

  # 重用 Lint 工作流的检查结果
  lint-checks:
    name: Lint 检查
    uses: ./.github/workflows/lint.yml

  # 重用导入测试工作流
  import-tests:
    name: 导入测试
    uses: ./.github/workflows/import-test.yml

  # 运行完整的项目健康检查
  full-check:
    name: 完整项目检查
    runs-on: ubuntu-latest
    needs: [import-tests]
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements-test.txt

      - name: "安装依赖（使用 pip-sync: core+dev+test）"
        run: |
          python -m pip install --upgrade pip pip-tools
          pip-sync requirements.txt requirements-dev.txt requirements-test.txt

      - name: 运行 check_all.sh --full --json --cov-fail-under 67
        id: check_all
        run: |
          chmod +x scripts/check_all.sh
          
          # 运行 JSON 模式检查
          # --cov-fail-under 67: PR gating 使用当前仓库基线覆盖率阈值
          # （CI matrix 单测使用 --cov-fail-under=0 仅收集覆盖率，不做阈值检查）
          # stdout → JSON 文件，stderr → 单独文件（保留诊断信息）
          set +e
          bash scripts/check_all.sh --full --ci --json --cov-fail-under 67 > /tmp/check_all.json 2>/tmp/check_all.stderr
          EXIT_CODE=$?
          set -e
          
          # 渲染 Markdown 到 Step Summary
          RENDER_ERROR=""
          if [ -f /tmp/check_all.json ]; then
            RENDER_ERROR=$(python scripts/render_check_all_summary.py /tmp/check_all.json 2>&1 > /tmp/render_output.md) || true
            if [ -z "$RENDER_ERROR" ] && [ -s /tmp/render_output.md ]; then
              cat /tmp/render_output.md >> $GITHUB_STEP_SUMMARY
            else
              # 渲染失败：优先展示渲染器错误 + stderr，再展示 JSON
              echo "## ⚠️ 渲染失败" >> $GITHUB_STEP_SUMMARY
              if [ -n "$RENDER_ERROR" ]; then
                echo "### 渲染器错误" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                echo "$RENDER_ERROR" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
              fi
              if [ -s /tmp/check_all.stderr ]; then
                echo "### check_all.sh stderr" >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
                cat /tmp/check_all.stderr >> $GITHUB_STEP_SUMMARY
                echo '```' >> $GITHUB_STEP_SUMMARY
              fi
              echo "### 原始 JSON 输出" >> $GITHUB_STEP_SUMMARY
              echo '```json' >> $GITHUB_STEP_SUMMARY
              cat /tmp/check_all.json >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          fi
          
          # 提取统计信息（从 JSON）
          # 注意：JSON 解析失败时设置 FAIL_COUNT=1，避免误报通过
          JSON_PARSE_OK=true
          if [ -f /tmp/check_all.json ]; then
            PASS_COUNT=$(python3 -c "import json; d=json.load(open('/tmp/check_all.json')); print(d.get('summary',{}).get('passed',0))" 2>/dev/null) || JSON_PARSE_OK=false
            FAIL_COUNT=$(python3 -c "import json; d=json.load(open('/tmp/check_all.json')); print(d.get('summary',{}).get('failed',0))" 2>/dev/null) || JSON_PARSE_OK=false
            WARN_COUNT=$(python3 -c "import json; d=json.load(open('/tmp/check_all.json')); print(d.get('summary',{}).get('warnings',0))" 2>/dev/null) || JSON_PARSE_OK=false
            
            if [ "$JSON_PARSE_OK" = "false" ]; then
              echo "::warning::JSON 解析失败，统计信息可能不准确"
              PASS_COUNT=0
              FAIL_COUNT=1
              WARN_COUNT=0
            fi
          else
            PASS_COUNT=0
            FAIL_COUNT=1
            WARN_COUNT=0
          fi
          
          echo "pass_count=$PASS_COUNT" >> $GITHUB_OUTPUT
          echo "fail_count=$FAIL_COUNT" >> $GITHUB_OUTPUT
          echo "warn_count=$WARN_COUNT" >> $GITHUB_OUTPUT
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          
          # 失败时输出原始内容便于排查
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::group::check_all.sh 原始 JSON 输出"
            cat /tmp/check_all.json 2>/dev/null || echo "无 JSON 输出文件"
            echo "::endgroup::"
            if [ -s /tmp/check_all.stderr ]; then
              echo "::group::check_all.sh stderr 输出"
              cat /tmp/check_all.stderr
              echo "::endgroup::"
            fi
          fi
          
          exit $EXIT_CODE

  # 代码格式检查
  format-check:
    name: 代码格式检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements-test.txt

      - name: "安装依赖（使用 pip-sync: core+dev）"
        run: |
          python -m pip install --upgrade pip pip-tools
          pip-sync requirements.txt requirements-dev.txt

      - name: 检查 ruff 格式
        id: ruff_format
        run: |
          echo "=== Ruff 格式检查 ==="
          set +e
          ruff format --check . 2>&1
          RUFF_EXIT=$?
          set -e
          
          if [ $RUFF_EXIT -ne 0 ]; then
            echo "has_unformatted=true" >> $GITHUB_OUTPUT
            echo "::warning::发现未格式化的代码，请运行 'ruff format .' 修复"
          else
            echo "has_unformatted=false" >> $GITHUB_OUTPUT
            echo "代码格式检查通过"
          fi
          
          # 不阻止 PR，只是警告
          exit 0

      - name: 检查 import 排序
        id: isort_check
        run: |
          echo "=== Import 排序检查 ==="
          set +e
          isort --check-only --diff . 2>&1
          ISORT_EXIT=$?
          set -e
          
          if [ $ISORT_EXIT -ne 0 ]; then
            echo "imports_unsorted=true" >> $GITHUB_OUTPUT
            echo "::warning::Import 排序不正确，请运行 'isort .' 修复"
          else
            echo "imports_unsorted=false" >> $GITHUB_OUTPUT
            echo "Import 排序检查通过"
          fi
          
          exit 0

  # PR 描述格式验证
  pr-description:
    name: PR 描述格式验证
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 验证 PR 描述
        id: validate_pr
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          echo "=== 验证 PR 描述格式 ==="
          
          ERRORS=()
          WARNINGS=()
          
          # 检查标题是否为空
          if [ -z "$PR_TITLE" ]; then
            ERRORS+=("PR 标题不能为空")
          fi
          
          # 检查标题长度
          TITLE_LEN=${#PR_TITLE}
          if [ $TITLE_LEN -gt 100 ]; then
            WARNINGS+=("PR 标题过长 ($TITLE_LEN 字符，建议 <= 100)")
          fi
          
          # 检查描述是否为空
          if [ -z "$PR_BODY" ]; then
            WARNINGS+=("PR 描述为空，建议添加描述说明")
          else
            # 检查描述是否包含关键部分
            BODY_LEN=${#PR_BODY}
            
            if [ $BODY_LEN -lt 20 ]; then
              WARNINGS+=("PR 描述过短 ($BODY_LEN 字符)，建议添加更多说明")
            fi
            
            # 检查是否包含 Summary 或 摘要 部分
            if echo "$PR_BODY" | grep -qiE '(##\s*(summary|摘要|概述|变更说明))'; then
              echo "✓ PR 描述包含摘要部分"
            else
              WARNINGS+=("建议在 PR 描述中添加 '## Summary' 或 '## 摘要' 部分")
            fi
            
            # 检查是否包含 Test Plan 或 测试计划
            if echo "$PR_BODY" | grep -qiE '(##\s*(test\s*plan|测试计划|测试方案))'; then
              echo "✓ PR 描述包含测试计划"
            else
              WARNINGS+=("建议在 PR 描述中添加 '## Test plan' 或 '## 测试计划' 部分")
            fi
          fi
          
          # 输出结果
          echo ""
          echo "=== 验证结果 ==="
          
          if [ ${#ERRORS[@]} -gt 0 ]; then
            echo "错误:"
            for err in "${ERRORS[@]}"; do
              echo "  ✗ $err"
              echo "::error::$err"
            done
          fi
          
          if [ ${#WARNINGS[@]} -gt 0 ]; then
            echo "警告:"
            for warn in "${WARNINGS[@]}"; do
              echo "  ⚠ $warn"
              echo "::warning::$warn"
            done
          fi
          
          if [ ${#ERRORS[@]} -eq 0 ] && [ ${#WARNINGS[@]} -eq 0 ]; then
            echo "✓ PR 描述格式良好"
          fi
          
          echo "error_count=${#ERRORS[@]}" >> $GITHUB_OUTPUT
          echo "warning_count=${#WARNINGS[@]}" >> $GITHUB_OUTPUT
          
          # 只有错误时才失败
          if [ ${#ERRORS[@]} -gt 0 ]; then
            exit 1
          fi

  # 无 API Key Smoke 测试（复用 CI 工作流）
  no-api-key-smoke:
    name: 无 API Key Smoke 测试
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements-test.txt

      - name: 安装 pip-tools
        run: python -m pip install --upgrade pip pip-tools

      - name: "安装依赖（使用 pip-sync: core only）"
        run: pip-sync requirements.txt

      - name: 无 API Key Smoke 测试
        env:
          CURSOR_API_KEY: ""
          CURSOR_CLOUD_API_KEY: ""
        run: |
          echo "## 无 API Key Smoke 测试 (PR)" >> $GITHUB_STEP_SUMMARY
          
          # 基础验证
          python run.py --help > /dev/null 2>&1 && echo "✅ run.py --help" >> $GITHUB_STEP_SUMMARY || exit 1
          python run.py --print-config 2>&1 | grep -qE "(requested_mode|effective_mode|config_path)" && echo "✅ --print-config" >> $GITHUB_STEP_SUMMARY || exit 1
          python scripts/run_iterate.py --help > /dev/null 2>&1 && echo "✅ scripts/run_iterate.py --help" >> $GITHUB_STEP_SUMMARY || exit 1
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **无 API Key Smoke 测试通过**" >> $GITHUB_STEP_SUMMARY

  # 检查摘要
  summary:
    name: 检查摘要
    runs-on: ubuntu-latest
    needs: [import-tests, full-check, format-check, pr-description, no-api-key-smoke]
    if: always()
    steps:
      - name: 生成检查摘要
        env:
          IMPORT_TESTS_RESULT: ${{ needs.import-tests.result }}
          FULL_CHECK_RESULT: ${{ needs.full-check.result }}
          FORMAT_CHECK_RESULT: ${{ needs.format-check.result }}
          PR_DESC_RESULT: ${{ needs.pr-description.result }}
          NO_API_KEY_SMOKE_RESULT: ${{ needs.no-api-key-smoke.result }}
          HAS_ML_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'run-ml-tests') }}
        run: |
          echo "# PR 检查摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 检查项 | 结果 |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          
          # 导入测试结果
          if [ "$IMPORT_TESTS_RESULT" = "success" ]; then
            echo "| 模块导入测试 | ✅ 通过 |" >> $GITHUB_STEP_SUMMARY
          elif [ "$IMPORT_TESTS_RESULT" = "failure" ]; then
            echo "| 模块导入测试 | ❌ 失败 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 模块导入测试 | ⚠️ $IMPORT_TESTS_RESULT |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # 完整检查结果
          if [ "$FULL_CHECK_RESULT" = "success" ]; then
            echo "| 完整项目检查 | ✅ 通过 |" >> $GITHUB_STEP_SUMMARY
          elif [ "$FULL_CHECK_RESULT" = "failure" ]; then
            echo "| 完整项目检查 | ❌ 失败 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 完整项目检查 | ⚠️ $FULL_CHECK_RESULT |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # 格式检查结果
          if [ "$FORMAT_CHECK_RESULT" = "success" ]; then
            echo "| 代码格式检查 | ✅ 通过 |" >> $GITHUB_STEP_SUMMARY
          elif [ "$FORMAT_CHECK_RESULT" = "failure" ]; then
            echo "| 代码格式检查 | ❌ 失败 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 代码格式检查 | ⚠️ $FORMAT_CHECK_RESULT |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # PR 描述验证结果
          if [ "$PR_DESC_RESULT" = "success" ]; then
            echo "| PR 描述格式 | ✅ 通过 |" >> $GITHUB_STEP_SUMMARY
          elif [ "$PR_DESC_RESULT" = "failure" ]; then
            echo "| PR 描述格式 | ❌ 失败 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| PR 描述格式 | ⚠️ $PR_DESC_RESULT |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # 无 API Key Smoke 测试结果
          if [ "$NO_API_KEY_SMOKE_RESULT" = "success" ]; then
            echo "| 无 API Key Smoke | ✅ 通过 |" >> $GITHUB_STEP_SUMMARY
          elif [ "$NO_API_KEY_SMOKE_RESULT" = "failure" ]; then
            echo "| 无 API Key Smoke | ❌ 失败 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 无 API Key Smoke | ⚠️ $NO_API_KEY_SMOKE_RESULT |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # ML 测试提示
          if [ "$HAS_ML_LABEL" = "true" ]; then
            echo "| ML 测试 (知识库/向量) | 🏃 已通过标签触发，见 CI 工作流 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| ML 测试 (知识库/向量) | ⏭️ 未触发 (添加 \`run-ml-tests\` 标签启用) |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # 总体结果
          if [ "$IMPORT_TESTS_RESULT" = "success" ] && [ "$FULL_CHECK_RESULT" = "success" ] && [ "$PR_DESC_RESULT" = "success" ] && [ "$NO_API_KEY_SMOKE_RESULT" = "success" ]; then
            echo "## ✅ 所有必要检查通过" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ 部分检查未通过，请查看详情" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 提示" >> $GITHUB_STEP_SUMMARY
          echo "- 运行 \`bash scripts/check_all.sh --full\` 本地检查" >> $GITHUB_STEP_SUMMARY
          echo "- 运行 \`python scripts/pre_commit_check.py --quick\` 检查模块导入" >> $GITHUB_STEP_SUMMARY
          echo "- 运行 \`ruff format .\` 自动格式化代码" >> $GITHUB_STEP_SUMMARY
          echo "- 运行 \`isort .\` 自动排序 imports" >> $GITHUB_STEP_SUMMARY
          echo "- 添加 \`run-ml-tests\` 标签运行 ML 测试 (知识库/向量索引)" >> $GITHUB_STEP_SUMMARY

      - name: 检查是否应该失败
        env:
          IMPORT_TESTS_RESULT: ${{ needs.import-tests.result }}
          FULL_CHECK_RESULT: ${{ needs.full-check.result }}
          PR_DESC_RESULT: ${{ needs.pr-description.result }}
          NO_API_KEY_SMOKE_RESULT: ${{ needs.no-api-key-smoke.result }}
        run: |
          # 导入测试、完整检查、PR 描述和无 API Key Smoke 是必须通过的
          if [ "$IMPORT_TESTS_RESULT" = "failure" ] || [ "$FULL_CHECK_RESULT" = "failure" ] || [ "$PR_DESC_RESULT" = "failure" ] || [ "$NO_API_KEY_SMOKE_RESULT" = "failure" ]; then
            echo "必要检查未通过"
            exit 1
          fi
          echo "所有必要检查通过"
